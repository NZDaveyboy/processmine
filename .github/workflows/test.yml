name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel in-progress runs on new pushes to the same ref.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-r:
    name: R CMD check
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R
          extra-packages: |
            any::devtools
            any::rcmdcheck
            any::roxygen2
            any::testthat
            any::styler
          needs: check

      - name: Generate documentation
        run: Rscript -e "roxygen2::roxygenise('R')"

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: R
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
          upload-snapshots: true

  test-python:
    name: Python lint + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package + dev deps
        run: pip install -e "./python[dev,ml]"

      - name: ruff
        run: ruff check python/

      - name: mypy
        run: mypy python/processmine_ml

      - name: pytest
        run: pytest python/ --cov=processmine_ml --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: python/coverage.xml
          flags: python
        continue-on-error: true

  notebooks:
    name: Execute notebooks
    runs-on: ubuntu-latest
    needs: [test-r, test-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install Python package + dev + ml
        run: pip install -e "./python[dev,ml]"

      - name: Execute Python notebook
        run: papermill notebooks/02_ml_analysis.ipynb /dev/null --cwd notebooks/

  roundtrip:
    name: Schema round-trip (R <-> Python)
    runs-on: ubuntu-latest
    needs: [test-r, test-python]
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R
          extra-packages: |
            any::reticulate
            any::arrow
            any::rmarkdown
            any::knitr
            any::devtools

      - name: Install Python package
        run: pip install -e "./python[ml]"

      - name: Run schema round-trip
        run: Rscript scripts/roundtrip_check.R

      - name: Run R bridge tests
        run: Rscript -e "devtools::test('R', filter='bridge')"

      - name: Render R notebook
        run: Rscript -e "rmarkdown::render('notebooks/01_process_analysis.Rmd', output_dir='notebooks/')"
        env:
          OMP_NUM_THREADS: '1'
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
